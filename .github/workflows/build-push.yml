name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push :latest
      # The cross-arm64 platform config selects the zig aarch64-linux-gnu.2.28
      # toolchain for CGO. The ci config adds --stamp for workspace status.
      - name: Push :latest to ghcr.io
        run: bazel run --config=ci //:push

      # Push sha-<short> tag using workspace status stamping
      - name: Push :sha-<commit> to ghcr.io
        run: bazel run --config=ci //:push_sha
