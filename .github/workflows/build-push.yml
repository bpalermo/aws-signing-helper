name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push :latest.
      # The cross-arm64 platform config selects the zig aarch64-linux-gnu.2.28
      # toolchain for CGO cross-compile. No stamping needed for the :latest tag.
      - name: Push :latest to ghcr.io
        run: bazel run --config=ci //:push

      # Push sha-<commit> tag. stamp="force" is set on the target itself so
      # no --stamp flag is needed, but workspace_status_command must be set
      # so Bazel can populate the GIT_COMMIT_SHORT template variable.
      - name: Push :sha-<commit> to ghcr.io
        run: |
          bazel run --config=ci \
            --workspace_status_command="${GITHUB_WORKSPACE}/bazel/workspace_status.sh" \
            //:push_sha
